        <meta
            name="description"
            content="Mirror interviews you with AI, finds patterns you missed, and produces a private insight document and a polished public profile. Nothing leaves your device."
        />
        <!--
      CSP mirrors src-tauri/tauri.conf.json for the PWA build.

      The trailing https: in connect-src permits any user-configured endpoint
      for the openai-compatible provider. This is an accepted limitation
      (ETHOS C3.5): no build-time CSP can enumerate arbitrary user-supplied
      endpoints. For a Tauri desktop build the three known provider domains
      are listed explicitly, and the broad https: serves only the PWA case.

      Long-term: generate this CSP meta tag at runtime after settings load,
      pinning connect-src to the single configured endpoint + known providers.
    -->
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; frame-src 'self' data:; connect-src 'self' https://api.openai.com https://api.anthropic.com https://api.mistral.ai https:;"
        />
        <title>Mirror</title>
      <script type="module" crossorigin src="/assets/index-C_xWSxNU.js"></script>
      <link rel="stylesheet" crossorigin href="/assets/index-DyKbTyEf.css">
